#:schema ./schemas/config-toml.schema.json

# Treat all other diagnostics as warnings (for early detection via jetls check)
[[diagnostic.patterns]]
pattern = ".*"
match_by = "code"
match_type = "regex"
severity = "warn"
path = "src/**/*.jl"
[[diagnostic.patterns]]
pattern = ".*"
match_by = "code"
match_type = "regex"
severity = "warn"
path = "LSP/src/**/*.jl"

[[diagnostic.patterns]]
pattern = "lowering/inactive-code"
match_by = "code"
match_type = "literal" # Outrank code-regex catch-all diagnostic rules
severity = "hint"
path = "**/*.jl"

# TODO [JETLS]
# Need to properly set module context when a single file contains multiple modules (for the new incremental full analysis mode)
[[diagnostic.patterns]]
pattern = ".*"
match_by = "message"
match_type = "regex"
severity = "off"
path = "LSP/src/LSP.jl"

# TODO [JETLS]
# `JETLSTestModule` is a pseudo lowering context only used as `analysis_overrides.module_name` for our test files; it is never reachable from JETLS itself, so diagnositcs against it are noise.
[[diagnostic.patterns]]
pattern = ".*"
match_by = "message"
match_type = "regex"
severity = "off"
path = "src/utils/JETLSTestModule.jl"

# TODO [JETLS]
# `@interface` type instability for anonymous interface definitions
[[diagnostic.patterns]]
pattern = "no matching method found `.*var\"AnonymousInterface.*`"
match_by = "message"
match_type = "regex"
severity = "off"
path = "LSP/src/**/*.jl"

# TODO [JETLS]
# When Revise updates the `Server` type graph, analyzing `run_serve` in the latest world
# sees an impossible assignment from latest `Server(endpoint)` to the old typed global.
[[diagnostic.patterns]]
pattern = "no matching method found `convert.*@world.JETLS[.]Server.*::JETLS[.]Server"
match_by = "message"
match_type = "regex"
severity = "off"
path = "src/app/cli-serve.jl"

# This is type instability within JSON3.jl
[[diagnostic.patterns]]
pattern = "no matching method found `convert(.+)`"
match_by = "message"
match_type = "regex"
severity = "off"
path = "src/testrunner/testrunner-types.jl"

[[initialization_options.analysis_overrides]]
module_name = "JETLS"
path = "src/**/*.jl"
[[initialization_options.analysis_overrides]]
module_name = "LSP"
path = "LSP/**/*.jl"

# Just disable analysis for test files for now
[[initialization_options.analysis_overrides]]
path = "test/**/*.jl"
module_name = "JETLSTestModule"
[[initialization_options.analysis_overrides]]
path = "LSP/test/**/*.jl"
module_name = "JETLSTestModule"
